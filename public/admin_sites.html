<script>
(function() {
    const goTo = (u) => { if(u) location.href = u; };
    document.addEventListener('click', (e) => {
        const el = e.target.closest('a, button');
        if (!el) return;
        const t = el.innerText.trim();
        if (t.includes('홈') || t.includes('HOME')) { 
            if (window.location.pathname.includes('admin')) { } else { e.preventDefault(); goTo('index.html'); }
        }
        else if (t.includes('관리자 로그인')) { e.preventDefault(); goTo('login.html'); }
        else if (t.includes('민원 관리') || t.includes('관리자 페이지') || t.includes('대시보드')) { e.preventDefault(); goTo('admin.html'); }
        else if (t.includes('기술 교육 영상') || t.includes('영상 보기')) { e.preventDefault(); goTo('videos.html'); }
        else if (t.includes('A/S 접수') || t.includes('접수하기')) { e.preventDefault(); goTo('request.html'); }
        else if (t.includes('현장 관리')) { e.preventDefault(); goTo('admin_sites.html'); }
        else if (t.includes('영상 관리')) { e.preventDefault(); goTo('admin_videos.html'); }
        else if (t.includes('페이지 설정') || t.includes('설정')) { e.preventDefault(); goTo('admin_settings.html'); }
        else if (t.includes('견적') || t.includes('견적 문의') || t.includes('견적문의')) { e.preventDefault(); goTo('quote.html'); }
        else if (t.includes('담당자 관리') || t.includes('담당자 배정')) { e.preventDefault(); goTo('admin_access.html'); }
        else if (t.includes('로그아웃')) { e.preventDefault(); sessionStorage.removeItem('mbs_token'); goTo('index.html'); }
    });
})();
</script>
\n<script>
document.addEventListener('DOMContentLoaded', () => {
    const fetchSites = async () => {
        const tbody = document.getElementById('sitesTableBody');
        if (!tbody) return;
        try {
            const res = await fetch('/api/sites');
            const data = await res.json();
            tbody.innerHTML = data.map(site => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 border-b font-bold text-primary">${site.name}</td>
                    <td class="p-4 border-b text-gray-600">${site.address || '-'}</td>
                    <td class="p-4 border-b font-bold text-gray-700">${site.contact_person || '-'}</td>
                    <td class="p-4 border-b text-gray-500">${site.contact_phone || '-'}</td>
                    <td class="p-4 border-b text-center">
                        <button onclick="deleteSite(${site.id})" class="text-red-500 hover:text-red-700 font-medium transition-colors">삭제</button>
                    </td>
                </tr>
            `).join('');
        } catch (err) {}
    };
    window.deleteSite = async (id) => {
        if (!confirm('삭제하시겠습니까?')) return;
        await fetch(`/api/sites/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('mbs_token') } });
        fetchSites();
    };
    const saveBtn = document.getElementById('saveSiteBtn');
    if (saveBtn) {
        saveBtn.onclick = async () => {
            const name = document.getElementById('siteName').value;
            const address = document.getElementById('siteAddress').value;
            await fetch('/api/sites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionStorage.getItem('mbs_token') },
                body: JSON.stringify({ name, address })
            });
            document.getElementById('siteModal').classList.add('hidden');
            fetchSites();
        };
    }
    fetchSites();
});
</script>\n</body></html>
